<div class="min-h-screen flex items-center justify-center pt-28 pb-20 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <div class="absolute top-[20%] left-[20%] w-96 h-96 bg-primary-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
  <div class="absolute bottom-[20%] right-[20%] w-96 h-96 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

  <div class="w-full max-w-md glass p-8 sm:p-10 rounded-3xl shadow-soft border border-white/20 dark:border-neutral-700/50 relative z-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 shadow-md mb-4">
        <span class="text-white font-heading font-extrabold text-2xl">S</span>
      </div>
      <h2 class="text-3xl font-heading font-bold tracking-tight">Admin Portal</h2>
      <p class="text-sm text-neutral-600 dark:text-neutral-400 mt-2">Sign in to manage the Sanadak portfolio system</p>
    </div>

    <div *ngIf="error()" class="mb-6 p-4 bg-primary-500/10 border border-primary-500/20 text-primary-500 rounded-2xl text-sm font-medium flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      {{ error() }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-semibold mb-2">Email Address</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
          class="w-full bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 text-neutral-800 dark:text-white"
          placeholder="admin@sanadak.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold mb-2">Password</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
          class="w-full bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 text-neutral-800 dark:text-white"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full border border-white/20 bg-white/5 text-white py-3.5 rounded-xl font-bold hover:bg-white/10 disabled:opacity-50 transition"
      >
        <svg *ngIf="loading()" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ loading() ? 'Signing in...' : 'Sign In' }}</span>
      </button>
    </form>
  </div>
</div>
