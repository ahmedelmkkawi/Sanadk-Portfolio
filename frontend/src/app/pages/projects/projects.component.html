<div class="min-h-screen pt-28 pb-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
  <!-- Header -->
  <div class="text-center max-w-3xl mx-auto mb-16">
    <h1 class="text-4xl md:text-6xl font-heading font-extrabold mb-4 tracking-tight">Our <span class="text-gradient">Projects</span></h1>
    <p class="text-lg text-neutral-600">Discover how we help global brands scale through our industry-leading solutions.</p>
  </div>

  <!-- Filters & Search Bar -->
  <div class="glass p-6 rounded-2xl mb-12 flex flex-col md:flex-row gap-4 items-center justify-between shadow-soft">
    <!-- Search -->
    <div class="relative w-full md:w-80">
      <input
        type="text"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        placeholder="Search projects..."
        class="w-full bg-white border border-neutral-200 px-4 py-3 pl-10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 text-neutral-800"
      />
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 absolute left-3 top-3.5 text-neutral-400">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21-21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
    </div>

    <!-- Dropdown Filters -->
    <div class="flex flex-wrap gap-4 w-full md:w-auto">
      <!-- Category Filter -->
      <div class="flex flex-col w-full sm:w-48">
        <select
          [ngModel]="selectedCategory()"
          (ngModelChange)="selectedCategory.set($event)"
        class="w-full bg-white border border-neutral-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 text-neutral-800"
        >
          <option *ngFor="let cat of categories()" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <!-- Tech Filter -->
      <div class="flex flex-col w-full sm:w-48">
        <select
          [ngModel]="selectedTech()"
          (ngModelChange)="selectedTech.set($event)"
        class="w-full bg-white border border-neutral-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 text-neutral-800"
        >
          <option *ngFor="let tech of technologies()" [value]="tech">{{ tech }}</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Projects Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let project of filteredProjects()" class="group card flex flex-col h-[520px] cursor-pointer bg-[#6f0f0f] border border-white/10 rounded-2xl overflow-hidden shadow-soft" (click)="openProjectDetails(project.slug)">
      <!-- Image Thumbnail -->
      <div class="relative h-56 overflow-hidden bg-neutral-100 flex-shrink-0">
        <img
          *ngIf="project.images[0]"
          [src]="project.images[0]"
          [alt]="project.title"
          class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        />
        <div
          *ngIf="!project.images[0]"
          class="w-full h-full flex items-center justify-center bg-neutral-800 text-neutral-400 text-sm"
        >
          No image
        </div>
        <span class="absolute top-4 left-4 inline-block px-3 py-1 text-xs font-semibold tracking-wider text-accent uppercase bg-black/70 rounded-full border border-accent/30 backdrop-blur-md">
          {{ project.category }}
        </span>
      </div>

      <!-- Details Content -->
      <div class="p-6 flex flex-col justify-between flex-grow">
        <div>
          <h3 class="text-2xl font-heading font-bold text-white mb-2 line-clamp-1 group-hover:text-primary-300 transition-colors">
            {{ project.title }}
          </h3>
          <p class="text-sm text-neutral-200 mb-4 line-clamp-3">
            {{ project.description }}
          </p>

          <!-- Technologies list -->
          <div class="flex flex-wrap gap-1.5 mb-6">
            <span *ngFor="let tech of project.technologies" class="text-xs bg-white/10 px-2.5 py-1 rounded-md text-white">
              {{ tech }}
            </span>
          </div>
        </div>

        <div>
          <!-- Team Avatars & Actions -->
          <div class="flex items-center justify-between border-t border-white/10 pt-4 mt-auto">
            <!-- Avatars -->
            <div class="flex -space-x-2 overflow-hidden">
              <ng-container *ngFor="let member of $any(project.teamMembers) | slice:0:3">
                <img
                  *ngIf="$any(member).image"
                  [src]="$any(member).image"
                  [alt]="$any(member).name"
                  [title]="$any(member).name"
                  class="inline-block h-8 w-8 rounded-full ring-2 ring-[#6f0f0f] object-cover"
                />
                <span
                  *ngIf="!$any(member).image"
                  class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-white/20 text-[10px] font-bold text-white ring-2 ring-[#6f0f0f]"
                  [title]="$any(member).name"
                >?</span>
              </ng-container>
              <div *ngIf="project.teamMembers.length > 3" class="flex h-8 w-8 items-center justify-center rounded-full bg-white/10 text-xs font-bold text-white ring-2 ring-[#6f0f0f]">
                +{{ project.teamMembers.length - 3 }}
              </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-2">
              <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank" (click)="$event.stopPropagation()" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors" title="GitHub Source">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.2 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
              </a>
              <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank" (click)="$event.stopPropagation()" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors" title="Live Preview">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              </a>
              <button type="button" (click)="$event.stopPropagation(); openProjectDetails(project.slug)" class="btn-primary text-xs px-3.5 py-2 font-semibold">
                Details
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="filteredProjects().length === 0" class="text-center py-24 glass rounded-3xl mt-12">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 mx-auto text-neutral-400 mb-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>
    <h3 class="text-xl font-heading font-bold mb-2">No projects found</h3>
    <p class="text-neutral-600 dark:text-neutral-400">Try adjusting your filters or search query.</p>
  </div>
</div>
